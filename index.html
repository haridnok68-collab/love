<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* VIDEO BACKGROUND */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* LOCK SCREEN */
#lockScreen {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: rgba(0,0,0,0.8);
}

input, button {
    padding: 10px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    margin: 5px;
}

/* MAIN */
#main {
    display: none;
    padding: 20px;
}

/* GALLERY */
.gallery {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    scroll-snap-type: x mandatory;
}

.gallery img {
    width: 80%;
    border-radius: 15px;
    scroll-snap-align: center;
}

/* LOVE LETTER */
#letter {
    display: none;
    background: rgba(255,255,255,0.9);
    color: black;
    padding: 20px;
    border-radius: 15px;
}

/* PROPOSAL */
#proposal {
    display: none;
    margin-top: 30px;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video autoplay muted loop>
    <source src="video.mp4" type="video/mp4">
</video>

<!-- PASSWORD SCREEN -->
<div id="lockScreen">
    <h1>🔒 Only for My Love</h1>
    <input type="password" id="pass" placeholder="Enter your birthday ❤️">
    <button onclick="unlock()">Unlock 💖</button>
</div>

<!-- MAIN CONTENT -->
<div id="main">

<h1>Happy Birthday My Vava ❤️</h1>

<!-- 💖 THIS IS WHERE YOU WRITE YOUR MESSAGE -->
<p id="yourMessage">
Happy Birthday My Love❤️
Vaveee I love you da  

I wish we keep celebrating your birthday's together forever 🧿

Radheee Radheee
</p>

<!-- TIME COUNTER -->
<h2>We have been together for ⏳</h2>
<p id="counter"></p>

<!-- GALLERY -->
<h2>Our Memories 📸</h2>
<div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<br>

<!-- VOICE -->
<button onclick="playVoice()">Play My Voice ❤️</button>

<br><br>

<!-- LOVE LETTER -->
<button onclick="showLetter()">Read Love Letter 💌</button>

<div id="letter">
    <!-- 💖 YOU CAN ALSO EDIT THIS LETTER -->
    <p>
    Write your own love letter here ❤️  
    </p>
</div>

<!-- PROPOSAL -->
<div id="proposal">
    <h2>Will you be mine forever? 💍</h2>
    <button onclick="yes()">YES ❤️</button>
    <button onclick="no()">NO 😜</button>
</div>

<br>
<button onclick="showProposal()">Final Surprise 🎁</button>

</div>

<!-- AUDIO -->
<audio id="voice">
    <source src="voice.mp3" type="audio/mpeg">
</audio>

<audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- FIREWORK -->
<canvas id="canvas"></canvas>

<script>

// PASSWORD (HER DOB)
function unlock(){
    if(document.getElementById("pass").value === "21042006"){
        document.getElementById("lockScreen").style.display="none";
        document.getElementById("main").style.display="block";
        startFireworks();
    } else {
        alert("That's not your special date 😜❤️");
    }
}

// VOICE
function playVoice(){
    document.getElementById("voice").play();
}

// LETTER
function showLetter(){
    document.getElementById("letter").style.display="block";
}

// PROPOSAL
function showProposal(){
    document.getElementById("proposal").style.display="block";
}

function yes(){
    alert("I LOVE YOU FOREVER ❤️");
}

function no(){
    alert("No option 😜❤️");
}

// RELATIONSHIP COUNTER
var startDate = new Date("April 9, 2024").getTime();

setInterval(()=>{
    var now = new Date().getTime();
    var diff = now - startDate;

    var days = Math.floor(diff/(1000*60*60*24));
    var hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));

    document.getElementById("counter").innerHTML =
        days + " days " + hours + " hours ❤️";
},1000);

// HEART FIREWORKS
var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

var particles = [];

function heartShape(t){
    return {
        x: 16*Math.pow(Math.sin(t),3),
        y: -(13*Math.cos(t) - 5*Math.cos(2*t)
        -2*Math.cos(3*t) - Math.cos(4*t))
    };
}

function createHeartFirework(x,y){
    for(let t=0; t<Math.PI*2; t+=0.2){
        let pos = heartShape(t);
        particles.push({
            x:x,
            y:y,
            dx: pos.x*0.5,
            dy: pos.y*0.5,
            life:100
        });
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x += p.dx;
        p.y += p.dy;
        p.life--;

        ctx.fillStyle="pink";
        ctx.fillRect(p.x,p.y,2,2);

        if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}

function startFireworks(){
    setInterval(()=>{
        createHeartFirework(
            Math.random()*canvas.width,
            Math.random()*canvas.height/2
        );
    },800);

    animate();
}

</script>

</body>
</html>
